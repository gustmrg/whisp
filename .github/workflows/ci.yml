name: Publish Docker Images and Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
      - "src/backend/**"
      - ".github/workflows/ci.yml"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/whisp-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/whisp-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Whisp.API/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/whisp-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/whisp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/whisp
            docker compose pull
            docker compose up -d --remove-orphans
